<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f19" />
      <stop offset="50%" stop-color="#111827" />
      <stop offset="100%" stop-color="#1f1a3a" />
    </linearGradient>
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="50%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
    <linearGradient id="glow-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.8" />
      <stop offset="50%" stop-color="#a78bfa" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#f472b6" stop-opacity="0.8" />
    </linearGradient>
    
    <style>
      .title {
        font-family: 'Outfit', 'Inter', -apple-system, sans-serif;
        font-weight: 800;
        font-size: 56px;
        fill: url(#text-grad);
      }
      .subtitle {
        font-family: 'Inter', -apple-system, sans-serif;
        font-weight: 400;
        font-size: 20px;
        fill: #9ca3af;
        letter-spacing: 4px;
      }
      .pulse-circle {
        animation: pulse 4s infinite ease-in-out;
      }
      .wave {
        animation: float 6s infinite ease-in-out;
        transform-origin: center;
      }
      @keyframes pulse {
        0%, 100% {
          transform: scale(1);
          opacity: 0.3;
        }
        50% {
          transform: scale(1.15);
          opacity: 0.8;
        }
      }
      @keyframes float {
        0%, 100% {
          transform: translateY(0) rotate(0deg);
        }
        50% {
          transform: translateY(-15px) rotate(2deg);
        }
      }
    </style>
    
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg-grad)" rx="16" />

  <!-- Animated Glowing Background Orbs -->
  <circle cx="200" cy="150" r="120" fill="#3b82f6" opacity="0.1" filter="url(#glow)" class="pulse-circle" style="animation-delay: 0s;" />
  <circle cx="1000" cy="250" r="150" fill="#ec4899" opacity="0.1" filter="url(#glow)" class="pulse-circle" style="animation-delay: 2s;" />

  <!-- Wave Lines (Dynamic Visuals representing Saturation ceiling) -->
  <g stroke="#ffffff" stroke-opacity="0.1" stroke-width="2" fill="none">
    <!-- Ceiling Limit Line -->
    <line x1="100" y1="80" x2="1100" y2="80" stroke="#ef4444" stroke-dasharray="8 4" stroke-opacity="0.4" stroke-width="3" />
    <text x="110" y="70" fill="#ef4444" font-family="sans-serif" font-size="12" font-weight="bold" letter-spacing="1">100% PERFORMANCE CEILING (SATURATION)</text>

    <!-- S-Curve Graph Lines -->
    <path d="M 100 320 Q 300 320 500 200 T 900 80 L 1100 80" stroke="url(#text-grad)" stroke-width="6" stroke-opacity="0.9" />
    <path d="M 100 340 Q 350 340 550 220 T 950 82 L 1100 82" stroke="#60a5fa" stroke-width="2" stroke-opacity="0.3" class="wave" />
  </g>

  <!-- Text & Titles -->
  <g transform="translate(100, 220)">
    <text class="title" x="0" y="0">AWESOME BENCHMARK SATURATION</text>
    <text class="subtitle" x="5" y="45">HISTORY • PROGRESSION • VARIANTS • MITIGATIONS</text>
  </g>
</svg>
